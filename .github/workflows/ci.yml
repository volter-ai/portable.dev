# Public-repo CI (volter-ai/portable.dev). Lives ONLY in the public mirror.
# Minimal, contains no secrets. Build + typecheck + tests + secret scan.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile || bun install
      - name: Typecheck
        run: bun run typecheck
      - name: Mobile tests
        # jest-expo distributes test files across workers by cached timing, so a cluster
        # of socket/api/voice suites can flake on a hostile schedule yet pass on a re-run
        # (the full run is the source of truth). DO NOT add --runInBand — it serializes the
        # shared onlineManager singleton and makes flakes worse. Re-run once on failure.
        run: |
          cd packages/mobile
          bun run test || { echo "::warning::mobile tests flaked; re-running once"; bun run test; }
      - name: Expo bundle check
        run: cd packages/mobile && bunx expo export --platform all || true

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # NOTE: gitleaks/gitleaks-action@v2 requires a PAID GITLEAKS_LICENSE for
      # organization-owned repos (volter-ai). The gitleaks CLI itself is free, so
      # run it directly with the shipped .gitleaks.toml — the SAME invocation the
      # private export gate uses, so public CI and the export scan agree.
      - name: Install gitleaks
        run: |
          VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan for secrets
        run: gitleaks detect --no-git --source . --redact --config .gitleaks.toml
